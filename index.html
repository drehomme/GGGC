<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G.G.G.C. - Grovner Garage Golf Club</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

<style>
body {
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#0f172a;
    color:#e2e8f0;
}

header {
    background:#020617;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

nav {
    display:flex;
    justify-content:center;
    background:#1e293b;
}

nav button {
    background:none;
    border:none;
    color:white;
    padding:12px 18px;
    cursor:pointer;
}

nav button:hover {
    background:#334155;
}

.container { padding:20px; }

.card {
    background:#1e293b;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    text-align:center;
}

input, button {
    padding:10px;
    margin:5px;
    border-radius:6px;
    border:none;
}

button.primary { background:#22c55e; color:black; }
button.danger { background:#ef4444; }

table {
    width:100%;
    border-collapse:collapse;
}

td, th {
    padding:10px;
    border-bottom:1px solid #334155;
}

/* Club selector image */
#clubImage {
    margin-top:20px;
    max-width:250px;
    border-radius:10px;
}
</style>

</head>

<body>

<header>⛳ Grovner Garage Golf Club (G.G.G.C.)</header>

<!-- AUTH -->

<div id="auth" class="container">
<div class="card">
<h2>Login / Sign Up</h2>

<input id="email" placeholder="Email">
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<br>
<button class="primary" onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<p id="authStatus"></p>
</div>
</div>

<!-- APP -->

<div id="app" style="display:none;">

<nav>
<button onclick="show('leaderboard')">Leaderboard</button>
<button onclick="show('scores')">Scores</button>
<button onclick="show('clubSelector')">Club Selector</button>
<button onclick="logout()">Logout</button>
</nav>

<div class="container">

<!-- Leaderboard -->

<div id="leaderboard" class="card">
<h2>Leaderboard</h2>
<table id="leaderTable"></table>
</div>


<!-- Scores -->

<div id="scores" class="card" style="display:none">
<h2>Add Score</h2>

<input id="scorePlayer" placeholder="Player Name">
<input id="scoreValue" type="number" placeholder="Score">
<button class="primary" onclick="addScore()">Add Score</button>
</div>

<!-- CLUB SELECTOR -->

<div id="clubSelector" class="card" style="display:none">
<h2>🏌️ Club Selector</h2>

<button class="primary" onclick="pickClub()">Pick Random Club</button>

<h3 id="clubResult"></h3>
<img id="clubImage" src="" style="display:none;">
</div>

</div>
</div>

<script>
let db;
let currentUser = null;

initSqlJs({
    locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
}).then(SQL => {

    const saved = localStorage.getItem("gggc_db");

    if (saved) {
        db = new SQL.Database(Uint8Array.from(atob(saved), c => c.charCodeAt(0)));
    } else {
        db = new SQL.Database();
        db.run(`
            CREATE TABLE players (id INTEGER PRIMARY KEY, name TEXT, user TEXT);
            CREATE TABLE scores (id INTEGER PRIMARY KEY, player TEXT, score INTEGER, user TEXT);
        `);
        saveDB();
    }

    const savedUser = localStorage.getItem("currentUser");
    if (savedUser) {
        currentUser = savedUser;
        showApp();
    }

    refresh();
});

function saveDB() {
    const data = db.export();
    const b64 = btoa(String.fromCharCode(...data));
    localStorage.setItem("gggc_db", b64);
}

// AUTH
function signup() {
    const email = emailEl().value;
    const user = userEl().value;
    const pass = passEl().value;

    if (!email || !user || !pass) return setStatus("Fill all fields");

    let users = JSON.parse(localStorage.getItem("users") || "[]");

    if (users.find(u => u.username === user)) {
        return setStatus("User exists");
    }

    users.push({ email, username:user, password:pass });
    localStorage.setItem("users", JSON.stringify(users));

    setStatus("Account created. Login now.");
}

function login() {
    const user = userEl().value;
    const pass = passEl().value;

    let users = JSON.parse(localStorage.getItem("users") || "[]");

    const found = users.find(u => u.username === user && u.password === pass);

    if (!found) return setStatus("Invalid login");

    currentUser = user;
    localStorage.setItem("currentUser", user);

    showApp();
}

function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}

function showApp() {
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
}

function setStatus(msg) {
    document.getElementById("authStatus").innerText = msg;
}

function emailEl(){ return document.getElementById("email"); }
function userEl(){ return document.getElementById("username"); }
function passEl(){ return document.getElementById("password"); }

// NAV
function show(id) {
    ["leaderboard","players","scores","clubSelector"].forEach(x=>{
        document.getElementById(x).style.display="none";
    });
    document.getElementById(id).style.display="block";
}

// PLAYERS
function addPlayer() {
    const name = document.getElementById("playerName").value;
    if (!name) return;

    db.run("INSERT INTO players (name,user) VALUES (?,?)",[name,currentUser]);
    saveDB();
    refresh();
}

function removePlayer(name) {
    db.run("DELETE FROM players WHERE name=? AND user=?",[name,currentUser]);
    saveDB();
    refresh();
}

// SCORES
function addScore() {
    const p = document.getElementById("scorePlayer").value;
    const s = document.getElementById("scoreValue").value;

    db.run("INSERT INTO scores (player,score,user) VALUES (?,?,?)",[p,s,currentUser]);
    saveDB();
    refresh();
}

// CLUB SELECTOR
const clubs = [
    { name:"Driver", img:"https://upload.wikimedia.org/wikipedia/commons/0/0b/Golf_driver.jpg" },
    { name:"5 Wood", img:"https://hickorygolfstore.com/cdn/shop/articles/fairway_wood2.jpg" },
    { name:"5 Iron", img:"https://upload.wikimedia.org/wikipedia/commons/2/2c/Golf_iron.jpg" },
    { name:"6 Iron", img:"https://upload.wikimedia.org/wikipedia/commons/2/2c/Golf_iron.jpg" },
    { name:"7 Iron", img:"https://upload.wikimedia.org/wikipedia/commons/2/2c/Golf_iron.jpg" },
    { name:"8 Iron", img:"https://upload.wikimedia.org/wikipedia/commons/2/2c/Golf_iron.jpg" },
    { name:"9 Iron", img:"https://upload.wikimedia.org/wikipedia/commons/2/2c/Golf_iron.jpg" },
    { name:"Pitching Wedge", img:"https://upload.wikimedia.org/wikipedia/commons/3/3d/Golf_wedge.jpg" },
    { name:"50 Degree", img:"https://upload.wikimedia.org/wikipedia/commons/3/3d/Golf_wedge.jpg" },
    { name:"54 Degree", img:"https://upload.wikimedia.org/wikipedia/commons/3/3d/Golf_wedge.jpg" },
    { name:"58 Degree", img:"https://upload.wikimedia.org/wikipedia/commons/3/3d/Golf_wedge.jpg" },
    { name:"69 Wedge", img:"https://upload.wikimedia.org/wikipedia/commons/3/3d/Golf_wedge.jpg" }
];

function pickClub() {
    const randomIndex = Math.floor(Math.random() * clubs.length);
    const club = clubs[randomIndex];

    document.getElementById("clubResult").innerText = club.name;

    const img = document.getElementById("clubImage");
    img.src = club.img;
    img.style.display = "block";
}

// REFRESH UI
function refresh() {

    const players = db.exec(`SELECT name FROM players WHERE user='${currentUser}'`);
    const list = document.getElementById("playerList");
    list.innerHTML="";

    if(players.length){
        players[0].values.forEach(p=>{
            list.innerHTML += `<li>${p[0]} 
            <button class="danger" onclick="removePlayer('${p[0]}')">X</button></li>`;
        });
    }

    const result = db.exec(`
        SELECT player, AVG(score) 
        FROM scores 
        WHERE user='${currentUser}'
        GROUP BY player 
        ORDER BY AVG(score) ASC
    `);

    const table = document.getElementById("leaderTable");
    table.innerHTML="<tr><th>Player</th><th>Avg Score</th></tr>";

    if(result.length){
        result[0].values.forEach(r=>{
            table.innerHTML += `<tr><td>${r[0]}</td><td>${r[1].toFixed(2)}</td></tr>`;
        });
    }
}
</script>

</body>
</html>
